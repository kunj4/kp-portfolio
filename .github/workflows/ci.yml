name: CI

# Build + deploy are handled by Cloudflare (incl. PR preview builds, which run
# `next build` and lint). This workflow covers what Cloudflare does not:
# secret scanning and dependency auditing.
#
# It deliberately uses ONLY GitHub-owned actions (checkout, setup-node) so it
# runs under the strict "owner/GitHub actions only" Actions policy — the secret
# scan is plain shell (same patterns as scripts/check-secrets.sh), no third-party
# action required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scan (dependency-free)
        run: |
          set -eu
          patterns='AKIA[0-9A-Z]{16}'
          patterns="$patterns|-----BEGIN ([A-Z]+ )?PRIVATE KEY-----"
          patterns="$patterns|gh[pousr]_[0-9A-Za-z]{36,}"
          patterns="$patterns|github_pat_[0-9A-Za-z_]{22,}"
          patterns="$patterns|xox[baprs]-[0-9A-Za-z-]{10,}"
          patterns="$patterns|sk_live_[0-9A-Za-z]{20,}"
          patterns="$patterns|AIza[0-9A-Za-z_-]{35}"
          patterns="$patterns|eyJ[A-Za-z0-9_-]{8,}[.][A-Za-z0-9_-]{8,}[.][A-Za-z0-9_-]{8,}"
          if git ls-files -z | xargs -0 grep -nIE "$patterns"; then
            echo "::error::Potential secret detected in tracked files"
            exit 1
          fi
          echo "No secrets found in tracked files."

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Informational: the contentlayer/pliny toolchain pulls a deep tree of
      # build-time-only advisories that are not reachable by site visitors.
      # Surfaced here for visibility without blocking merges.
      - name: Dependency audit (runtime deps)
        run: yarn audit --groups dependencies --level high
        continue-on-error: true
